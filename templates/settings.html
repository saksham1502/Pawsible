<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Pawsible</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .custom-navbar {
            background-color: #7F7F7E9;
        }
        .settings-container {
            padding: 30px 0;
        }
        .settings-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .section-title {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }
        .btn-primary-custom {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 10px 30px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg custom-navbar">
        <div class="container-fluid">
            <a class="navbar-brand text-white fw-bold" href="/dashboard">🐾 Pawsible</a>
            <div class="d-flex align-items-center">
                <a href="/dashboard" class="btn btn-outline-light me-2">Dashboard</a>
                <a href="/schedules" class="btn btn-outline-light me-2">Schedules</a>
                <button class="btn btn-outline-light" onclick="handleLogout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container settings-container">
        <h2 class="text-white mb-4">Account Settings</h2>

        <!-- Profile Settings -->
        <div class="settings-card">
            <h4 class="section-title">Profile Information</h4>
            <form id="emailForm">
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="userEmail" required>
                </div>
                <button type="submit" class="btn btn-primary-custom">Update Email</button>
            </form>
        </div>

        <!-- Password Settings -->
        <div class="settings-card">
            <h4 class="section-title">Change Password</h4>
            <form id="passwordForm">
                <div class="mb-3">
                    <label class="form-label">Current Password</label>
                    <input type="password" class="form-control" id="currentPassword" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">New Password</label>
                    <input type="password" class="form-control" id="newPassword" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Confirm New Password</label>
                    <input type="password" class="form-control" id="confirmPassword" required>
                </div>
                <button type="submit" class="btn btn-primary-custom">Update Password</button>
            </form>
        </div>

        <!-- Notification Preferences -->
        <div class="settings-card">
            <h4 class="section-title">Notification Preferences</h4>
            <form id="notificationForm">
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="emailNotifications">
                    <label class="form-check-label" for="emailNotifications">
                        Email Notifications
                    </label>
                </div>
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="vaccinationReminders">
                    <label class="form-check-label" for="vaccinationReminders">
                        Vaccination Reminders
                    </label>
                </div>
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="uploadConfirmations">
                    <label class="form-check-label" for="uploadConfirmations">
                        Upload Confirmations
                    </label>
                </div>
                <button type="submit" class="btn btn-primary-custom">Save Preferences</button>
            </form>
        </div>

        <!-- Feedback -->
        <div class="settings-card">
            <h4 class="section-title">Feedback</h4>
            <p>We'd love to hear from you! Share your experience or suggestions.</p>
            <a href="https://forms.google.com/your-feedback-form" target="_blank" class="btn btn-primary-custom">Give Feedback</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function checkAuth() {
            const response = await fetch('/api/check-auth');
            const data = await response.json();
            if (!data.authenticated) {
                window.location.href = '/';
            } else {
                loadSettings();
            }
        }

        async function loadSettings() {
            const response = await fetch('/api/settings');
            const settings = await response.json();
            
            document.getElementById('userEmail').value = settings.email;
            document.getElementById('emailNotifications').checked = settings.email_notifications;
            document.getElementById('vaccinationReminders').checked = settings.vaccination_reminders;
            document.getElementById('uploadConfirmations').checked = settings.upload_confirmations;
        }

        document.getElementById('emailForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('userEmail').value;
            
            const response = await fetch('/api/settings/email', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });

            const data = await response.json();
            if (response.ok) {
                alert('Email updated successfully!');
            } else {
                alert(data.error);
            }
        });

        document.getElementById('passwordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                alert('New passwords do not match!');
                return;
            }
            
            const response = await fetch('/api/settings/password', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ current_password: currentPassword, new_password: newPassword })
            });

            const data = await response.json();
            if (response.ok) {
                alert('Password updated successfully!');
                document.getElementById('passwordForm').reset();
            } else {
                alert(data.error);
            }
        });

        document.getElementById('notificationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                email_notifications: document.getElementById('emailNotifications').checked,
                vaccination_reminders: document.getElementById('vaccinationReminders').checked,
                upload_confirmations: document.getElementById('uploadConfirmations').checked
            };
            
            const response = await fetch('/api/settings/notifications', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                alert('Preferences saved successfully!');
            }
        });

        async function handleLogout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/';
        }

        checkAuth();
    </script>
</body>
</html>
