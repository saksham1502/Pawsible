<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedules - Pawsible</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .custom-navbar {
            background-color: #7F7F7E9;
        }
        .schedule-container {
            padding: 30px 0;
        }
        .schedule-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .schedule-item {
            background: #f8f9fa;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        .add-schedule-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg custom-navbar">
        <div class="container-fluid">
            <a class="navbar-brand text-white fw-bold" href="/dashboard">🐾 Pawsible</a>
            <div class="d-flex align-items-center">
                <a href="/dashboard" class="btn btn-outline-light me-2">Dashboard</a>
                <a href="/settings" class="btn btn-outline-light me-2">Settings</a>
                <button class="btn btn-outline-light" onclick="handleLogout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container schedule-container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-white">Activity Schedules</h2>
            <button class="add-schedule-btn" onclick="showAddScheduleModal()">+ Add Schedule</button>
        </div>

        <div class="schedule-card">
            <div id="schedulesContainer">
                <p class="text-muted">Loading schedules...</p>
            </div>
        </div>
    </div>

    <!-- Add Schedule Modal -->
    <div class="modal fade" id="addScheduleModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add New Schedule</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addScheduleForm">
                        <div class="mb-3">
                            <label class="form-label">Title *</label>
                            <input type="text" class="form-control" id="scheduleTitle" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Event Type</label>
                            <select class="form-control" id="scheduleType">
                                <option value="Vaccination">Vaccination</option>
                                <option value="Vet Appointment">Vet Appointment</option>
                                <option value="Grooming">Grooming</option>
                                <option value="Feeding">Feeding</option>
                                <option value="Exercise">Exercise</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Date & Time *</label>
                            <input type="datetime-local" class="form-control" id="scheduleDate" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Select Pet</label>
                            <select class="form-control" id="schedulePet">
                                <option value="">All Pets</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Notes</label>
                            <textarea class="form-control" id="scheduleNotes" rows="3"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Add Schedule</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const addScheduleModal = new bootstrap.Modal(document.getElementById('addScheduleModal'));

        async function checkAuth() {
            const response = await fetch('/api/check-auth');
            const data = await response.json();
            if (!data.authenticated) {
                window.location.href = '/';
            } else {
                loadSchedules();
                loadPets();
            }
        }

        async function loadPets() {
            const response = await fetch('/api/pets');
            const pets = await response.json();
            
            const select = document.getElementById('schedulePet');
            pets.forEach(pet => {
                const option = document.createElement('option');
                option.value = pet.id;
                option.textContent = pet.name;
                select.appendChild(option);
            });
        }

        async function loadSchedules() {
            const response = await fetch('/api/schedules');
            const schedules = await response.json();
            
            const container = document.getElementById('schedulesContainer');
            container.innerHTML = '';

            if (schedules.length === 0) {
                container.innerHTML = '<p class="text-muted">No schedules yet. Add your first schedule!</p>';
                return;
            }

            schedules.forEach(schedule => {
                const scheduleItem = document.createElement('div');
                scheduleItem.className = 'schedule-item';
                scheduleItem.innerHTML = `
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <h5>${schedule.title}</h5>
                            <p class="mb-1"><strong>Type:</strong> ${schedule.event_type || 'General'}</p>
                            <p class="mb-1"><strong>Date:</strong> ${schedule.date}</p>
                            ${schedule.notes ? `<p class="mb-0"><strong>Notes:</strong> ${schedule.notes}</p>` : ''}
                        </div>
                        <button class="btn btn-sm btn-danger" onclick="deleteSchedule(${schedule.id})">Delete</button>
                    </div>
                `;
                container.appendChild(scheduleItem);
            });
        }

        function showAddScheduleModal() {
            addScheduleModal.show();
        }

        document.getElementById('addScheduleForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                title: document.getElementById('scheduleTitle').value,
                event_type: document.getElementById('scheduleType').value,
                date: document.getElementById('scheduleDate').value,
                notes: document.getElementById('scheduleNotes').value,
                pet_id: document.getElementById('schedulePet').value || null
            };

            const response = await fetch('/api/schedules', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                addScheduleModal.hide();
                document.getElementById('addScheduleForm').reset();
                loadSchedules();
            }
        });

        async function deleteSchedule(scheduleId) {
            if (confirm('Are you sure you want to delete this schedule?')) {
                await fetch(`/api/schedules/${scheduleId}`, { method: 'DELETE' });
                loadSchedules();
            }
        }

        async function handleLogout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/';
        }

        checkAuth();
    </script>
</body>
</html>
