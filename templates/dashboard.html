<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Pawsible</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .custom-navbar {
            background-color: #7F7F7E9;
        }
        .dashboard-container {
            padding: 30px 0;
        }
        .pet-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .pet-card:hover {
            transform: translateY(-5px);
        }
        .pet-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .add-pet-card {
            background: white;
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .add-pet-card:hover {
            background: #f8f9fa;
            border-color: #764ba2;
        }
        .document-item {
            background: #f8f9fa;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-content {
            border-radius: 15px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg custom-navbar">
        <div class="container-fluid">
            <a class="navbar-brand text-white fw-bold" href="/dashboard">🐾 Pawsible</a>
            <div class="d-flex align-items-center">
                <a href="/schedules" class="btn btn-outline-light me-2">Schedules</a>
                <a href="/settings" class="btn btn-outline-light me-2">Settings</a>
                <span class="text-white me-3" id="userEmail"></span>
                <button class="btn btn-outline-light" onclick="handleLogout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container dashboard-container">
        <h2 class="text-white mb-4">My Pets</h2>
        <div class="row" id="petsContainer">
            <div class="col-md-4">
                <div class="add-pet-card" onclick="showAddPetModal()">
                    <h1 style="font-size: 4rem;">+</h1>
                    <h4>Add New Pet</h4>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Pet Modal -->
    <div class="modal fade" id="addPetModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add New Pet</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addPetForm">
                        <div class="mb-3">
                            <label class="form-label">Pet Name *</label>
                            <input type="text" class="form-control" id="petName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Species *</label>
                            <select class="form-control" id="petSpecies" required>
                                <option value="">Select Species</option>
                                <option value="Dog">Dog</option>
                                <option value="Cat">Cat</option>
                                <option value="Bird">Bird</option>
                                <option value="Rabbit">Rabbit</option>
                                <option value="Fish">Fish</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Breed</label>
                            <input type="text" class="form-control" id="petBreed">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Age (years)</label>
                            <input type="number" class="form-control" id="petAge" min="0">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Photo</label>
                            <input type="file" class="form-control" id="petPhoto" accept="image/*">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Add Pet</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Pet Details Modal -->
    <div class="modal fade" id="petDetailsModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="petDetailsTitle"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="petDetailsContent"></div>
                    <hr>
                    <h5>Documents</h5>
                    <form id="uploadDocumentForm" class="mb-3">
                        <div class="row">
                            <div class="col-md-4">
                                <input type="text" class="form-control" id="docName" placeholder="Document Name" required>
                            </div>
                            <div class="col-md-4">
                                <select class="form-control" id="docType">
                                    <option value="Medical">Medical Record</option>
                                    <option value="Vaccination">Vaccination</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <input type="file" class="form-control" id="docFile" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-sm btn-primary mt-2">Upload Document</button>
                    </form>
                    <div id="documentsContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentPetId = null;
        const addPetModal = new bootstrap.Modal(document.getElementById('addPetModal'));
        const petDetailsModal = new bootstrap.Modal(document.getElementById('petDetailsModal'));

        async function checkAuth() {
            const response = await fetch('/api/check-auth');
            const data = await response.json();
            if (!data.authenticated) {
                window.location.href = '/';
            } else {
                document.getElementById('userEmail').textContent = data.email;
                loadPets();
            }
        }

        async function loadPets() {
            const response = await fetch('/api/pets');
            const pets = await response.json();
            
            const container = document.getElementById('petsContainer');
            const addPetCard = container.querySelector('.col-md-4');
            container.innerHTML = '';
            container.appendChild(addPetCard);

            pets.forEach(pet => {
                const petCard = document.createElement('div');
                petCard.className = 'col-md-4';
                petCard.innerHTML = `
                    <div class="pet-card">
                        <img src="${pet.photo ? '/static/uploads/pets/' + pet.photo : 'https://via.placeholder.com/300x200?text=No+Photo'}" 
                             class="pet-image" alt="${pet.name}">
                        <h4>${pet.name}</h4>
                        <p class="mb-1"><strong>Species:</strong> ${pet.species}</p>
                        ${pet.breed ? `<p class="mb-1"><strong>Breed:</strong> ${pet.breed}</p>` : ''}
                        ${pet.age ? `<p class="mb-1"><strong>Age:</strong> ${pet.age} years</p>` : ''}
                        <div class="d-flex gap-2 mt-3">
                            <button class="btn btn-sm btn-primary flex-fill" onclick="showPetDetails(${pet.id})">View Details</button>
                            <button class="btn btn-sm btn-danger" onclick="deletePet(${pet.id})">Delete</button>
                        </div>
                    </div>
                `;
                container.appendChild(petCard);
            });
        }

        function showAddPetModal() {
            addPetModal.show();
        }

        document.getElementById('addPetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('name', document.getElementById('petName').value);
            formData.append('species', document.getElementById('petSpecies').value);
            formData.append('breed', document.getElementById('petBreed').value);
            formData.append('age', document.getElementById('petAge').value);
            
            const photoFile = document.getElementById('petPhoto').files[0];
            if (photoFile) {
                formData.append('photo', photoFile);
            }

            const response = await fetch('/api/pets', {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                addPetModal.hide();
                document.getElementById('addPetForm').reset();
                loadPets();
            }
        });

        async function deletePet(petId) {
            if (confirm('Are you sure you want to delete this pet?')) {
                await fetch(`/api/pets/${petId}`, { method: 'DELETE' });
                loadPets();
            }
        }

        async function showPetDetails(petId) {
            currentPetId = petId;
            const response = await fetch('/api/pets');
            const pets = await response.json();
            const pet = pets.find(p => p.id === petId);

            document.getElementById('petDetailsTitle').textContent = pet.name;
            document.getElementById('petDetailsContent').innerHTML = `
                <img src="${pet.photo ? '/static/uploads/pets/' + pet.photo : 'https://via.placeholder.com/300x200?text=No+Photo'}" 
                     style="width: 100%; max-height: 300px; object-fit: cover; border-radius: 10px; margin-bottom: 15px;">
                <p><strong>Species:</strong> ${pet.species}</p>
                ${pet.breed ? `<p><strong>Breed:</strong> ${pet.breed}</p>` : ''}
                ${pet.age ? `<p><strong>Age:</strong> ${pet.age} years</p>` : ''}
            `;

            loadDocuments(petId);
            petDetailsModal.show();
        }

        async function loadDocuments(petId) {
            const response = await fetch(`/api/pets/${petId}/documents`);
            const documents = await response.json();
            
            const container = document.getElementById('documentsContainer');
            container.innerHTML = '';

            if (documents.length === 0) {
                container.innerHTML = '<p class="text-muted">No documents uploaded yet.</p>';
                return;
            }

            documents.forEach(doc => {
                const docItem = document.createElement('div');
                docItem.className = 'document-item';
                docItem.innerHTML = `
                    <div>
                        <strong>${doc.name}</strong>
                        <small class="text-muted d-block">${doc.doc_type} - ${doc.uploaded_at}</small>
                    </div>
                    <div>
                        <a href="/static/uploads/documents/${doc.filename}" target="_blank" class="btn btn-sm btn-info me-2">View</a>
                        <button class="btn btn-sm btn-danger" onclick="deleteDocument(${doc.id})">Delete</button>
                    </div>
                `;
                container.appendChild(docItem);
            });
        }

        document.getElementById('uploadDocumentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('name', document.getElementById('docName').value);
            formData.append('type', document.getElementById('docType').value);
            formData.append('document', document.getElementById('docFile').files[0]);

            const response = await fetch(`/api/pets/${currentPetId}/documents`, {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                document.getElementById('uploadDocumentForm').reset();
                loadDocuments(currentPetId);
            }
        });

        async function deleteDocument(docId) {
            if (confirm('Are you sure you want to delete this document?')) {
                await fetch(`/api/documents/${docId}`, { method: 'DELETE' });
                loadDocuments(currentPetId);
            }
        }

        async function handleLogout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/';
        }

        checkAuth();
    </script>
</body>
</html>
